version: 2

sources:
  - name: event_sink
    database: "{{ env_var('ASPECTS_EVENT_SINK_DATABASE', 'event_sink')}}"
    tables:

      - name: object_tag
        description: >
          Course objects and their associated tags from events:
          CMS - COURSE_CREATED, XBLOCK_CREATED, LIBRARY_BLOCK_CREATED, CONTENT_OBJECT_ASSOCIATIONS_CHANGED
        columns:
          - name: id
            description: '{{ doc("id") }}'
            type: Int32
          - name: object_id
            description: '{{ doc("object_id") }}'
            type: String
          - name: taxonomy
            description: "Foreign key to the taxonomy"
            type: Int32
          - name: tag
            description: "The name of the tag"
            type: String
          - name: _value
            description: "Tag string"
            type: String
          - name: _export_id
            description: "Export ID"
            type: String
          - name: lineage
            description: "Lineage data of the tag for parent tags"
            type: String
          - name: dump_id
            description: '{{ doc("dump_id") }}'
            type: UUID
          - name: time_last_dumped
            description: '{{ doc("time_last_dumped") }}'
            type: String

      - name: taxonomy
        description: Taxonomy data table
        columns:
          - name: id
            description: '{{ doc("id") }}'
            type: Int32
          - name: name
            description: "Name for the taxonomy"
            type: String
          - name: dump_id
            description: '{{ doc("dump_id") }}'
            type: UUID
          - name: time_last_dumped
            description: '{{ doc("time_last_dumped") }}'
            type: String

      - name: tag
        description: All tags for all taxonomies. Includes parent tag and lineage string for heirarchal relationships
        columns:
          - name: id
            description: '{{ doc("id") }}'
            type: Int32
          - name: taxonomy
            description: "Foreign key to the taxonomy"
            type: Int32
          - name: parent
            description: "Foreign key to the parent tag"
            type: Int32
          - name: value
            description: "Tag string"
            type: String
          - name: external_id
            description: "External ID"
            type: String
          - name: lineage
            description: "Lineage data of the tag for parent tags"
            type: String
          - name: dump_id
            description: '{{ doc("dump_id") }}'
            type: UUID
          - name: time_last_dumped
            description: '{{ doc("time_last_dumped") }}'
            type: String
